<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UDIN FINANCE</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">
<button onclick="logout()" style="
  float: right;
  background: transparent;
  border: 1px solid white;
  color: white;
  padding: 5px 10px;
  border-radius: 10px;
  cursor: pointer;
">
  Keluar
</button>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  padding: 10px;
}

.container {
  width: 100%;
  max-width: 500px;
  margin: auto;
}

/* SALDO */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.balance {
  font-size: 24px;
  font-weight: bold;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 5px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.income-btn {
  background: #22c55e;
}

.expense-btn {
  background: #ef4444;
}

/* LIST */
ul {
  padding: 0;
}

li {
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1e293b;
  padding: 12px;
  margin: 5px 0;
  border-radius: 10px;
}

.income {
  color: #22c55e;
}

.expense {
  color: #ef4444;
}

/* DELETE BUTTON */
.delete {
  background: transparent;
  color: red;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 500px) {
  h1, h2 {
    text-align: center;
    font-size: 20px;
  }

  .balance {
    font-size: 20px;
  }
}
</style>

</head>

<body>

<div class="header">
  <div>💰 UDIN FINANCE</div>
  <div class="balance" id="balance">Rp 0</div>

  <div class="summary">
    <div>Masuk: <span id="income">Rp 0</span></div>
    <div>Keluar: <span id="expense">Rp 0</span></div>
  </div>
</div>

<div class="container">

  <div class="card">
    <h3>Tambah Transaksi</h3>

    <input id="title" placeholder="Keterangan">
    <input id="amount" type="number" placeholder="Jumlah">

    <div class="row">
      <button class="btn-income" onclick="addIncome()">+ 
Pemasukan</button>
      <button class="btn-expense" onclick="addExpense()">- 
Pengeluaran</button>
    </div>
  </div>

  <div class="card">
    <h3>Pemasukan</h3>
    <ul id="income-list"></ul>
  </div>

  <div class="card">
    <h3>Pengeluaran</h3>
    <ul id="expense-list"></ul>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
