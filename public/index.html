<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UDIN FINANCE</title>

<style>
* {
  box-sizing: border-box;
}
button {
  color: black;
  -webkit-appearance: none;
  appearance: none;
}

body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  padding: 10px;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #1e293b, #334155);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.header h1 {
  margin: 0;
  font-size: 18px;
}

.logout {
  float: right;
  background: transparent;
  color: white;
  border: 1px solid #555;
  padding: 5px 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

/* TEXT */
.income-text {
  color: #22c55e;
  font-weight: bold;
}

.expense-text {
  color: #ef4444;
  font-weight: bold;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.income-btn {
  background: #22c55e;
}

.expense-btn {
  background: #ef4444;
}

.income-btn:hover {
  background: #16a34a;
}

.expense-btn:hover {
  background: #dc2626;
}

/* LIST */
ul {
  padding: 0;
}

li {
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1e293b;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
}

/* ITEM */
.item-left {
  flex: 1;
}

.item-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.amount {
  font-weight: bold;
}

/* DELETE */
.delete {
  background: transparent;
  border: none;
  color: #ef4444;
  font-size: 18px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 500px) {
  h1, h2 {
    text-align: center;
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <button class="logout" onclick="logout()">Keluar</button>
    <h1>💰 UDIN FINANCE</h1>
  </div>

  <!-- SALDO -->
  <div class="card">
    <h2>Rp <span id="balance">0</span></h2>
    <p>Masuk: <span id="income" class="income-text">0</span></p>
    <p>Keluar: <span id="expense" class="expense-text">0</span></p>
  </div>

  <!-- INPUT -->
  <div class="card">
    <h3>Tambah Transaksi</h3>
    <input id="title" placeholder="Keterangan">
    <input id="amount" type="number" placeholder="Jumlah">
    <button class="income-btn" onclick="addTransaction('income')">+ 
Pemasukan</button>
    <button class="expense-btn" onclick="addTransaction('expense')">- 
Pengeluaran</button>
  </div>

  <!-- LIST -->
<div class="card">
  <h3 class="income-text">📗 Pemasukan</h3>
  <ul id="incomeList"></ul>
</div>

<div class="card">
  <h3 class="expense-text">📕 Pengeluaran</h3>
  <ul id="expenseList"></ul>
</div>

<script>
const API_URL = "https://rich-udin.onrender.com/api";
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/login.html";
}

// FORMAT RUPIAH
function formatRupiah(angka) {
  return new Intl.NumberFormat("id-ID").format(angka);
}

// LOAD DATA
async function loadData() {
  const res = await fetch(API_URL + "/transactions", {
    headers: { Authorization: token }
  });

  const data = await res.json();

  const incomeList = document.getElementById("incomeList");
  const expenseList = document.getElementById("expenseList");

  incomeList.innerHTML = "";
  expenseList.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");

    li.innerHTML = `
      <div class="item-left">${item.title}</div>
      <div class="item-right">
        <span class="amount ${item.type === 'income' ? 'income-text' : 
'expense-text'}">
          Rp ${formatRupiah(item.amount)}
        </span>
        <button class="delete" 
onclick="deleteData('${item._id}')">🗑</button>
      </div>
    `;

    if (item.type === "income") {
      incomeList.appendChild(li);
    } else {
      expenseList.appendChild(li);
    }
  });
}


// ADD
async function addTransaction(type) {
  const title = document.getElementById("title").value;
  const amount = document.getElementById("amount").value;

  if (!title || !amount) {
    alert("Isi dulu!");
    return;
  }

  await fetch(API_URL + "/transactions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: token
    },
    body: JSON.stringify({
      title,
      amount: Number(amount),
      type
    })
  });

  document.getElementById("title").value = "";
  document.getElementById("amount").value = "";

  loadData();
  loadStats();
}

// DELETE
async function deleteData(id) {
  await fetch(API_URL + "/transactions/" + id, {
    method: "DELETE",
    headers: { Authorization: token }
  });

  loadData();
  loadStats();
}

// STATS
async function loadStats() {
  const res = await fetch(API_URL + "/stats", {
    headers: { Authorization: token }
  });

  const data = await res.json();

  document.getElementById("income").innerText = formatRupiah(data.income);
  document.getElementById("expense").innerText = 
formatRupiah(data.expense);
  document.getElementById("balance").innerText = 
formatRupiah(data.balance);
}

// LOGOUT
function logout() {
  if (confirm("Yakin logout?")) {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
  }
}

// INIT
loadData();
loadStats();
</script>

</body>
</html>
